name: fincore_checkpoint
config_version: 1.0
class_name: SimpleCheckpoint
run_name_template: "%Y%m%d-%H%M%S-fincore"

validations:
  - batch_request:
      datasource_name: fincore_postgres
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: customers
    expectation_suite_name: customers_suite

  - batch_request:
      datasource_name: fincore_postgres
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: accounts
    expectation_suite_name: accounts_suite

  - batch_request:
      datasource_name: fincore_postgres
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: transactions
    expectation_suite_name: transactions_suite

  - batch_request:
      datasource_name: fincore_postgres
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: loans
    expectation_suite_name: loans_suite

site_names:
  - local_site
